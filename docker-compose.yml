services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-personalstock}
      POSTGRES_USER: ${DB_USER:-personalstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-personalstock}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./portfolio_backend
      dockerfile: Dockerfile
    env_file:
      - ./deploy/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - backend_db:/app/db
      - backend_models:/app/portfolio/ml_engine/models
      - ${BACKUP_SSD_PATH:-/mnt/BackupSSD}:/mnt/BackupSSD
    ports:
      - "8001:8000"
    restart: unless-stopped

  celery_worker:
    build:
      context: ./portfolio_backend
      dockerfile: Dockerfile
    command: celery -A portfolio_backend worker --loglevel=INFO --pool=solo
    env_file:
      - ./deploy/.env
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - backend_db:/app/db
      - backend_models:/app/portfolio/ml_engine/models
      - ${BACKUP_SSD_PATH:-/mnt/BackupSSD}:/mnt/BackupSSD
    restart: unless-stopped

  celery_beat:
    build:
      context: ./portfolio_backend
      dockerfile: Dockerfile
    command: celery -A portfolio_backend beat --loglevel=INFO
    env_file:
      - ./deploy/.env
    environment:
      - CELERYBEAT_SCHEDULE=/tmp/celerybeat-schedule
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - backend_db:/app/db
      - backend_models:/app/portfolio/ml_engine/models
      - ${BACKUP_SSD_PATH:-/mnt/BackupSSD}:/mnt/BackupSSD
    restart: unless-stopped

  realtime_tracker:
    build:
      context: ./portfolio_backend
      dockerfile: Dockerfile
    command: python manage.py realtime_tracker
    env_file:
      - ./deploy/.env
    depends_on:
      - postgres
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./portfolio-frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3001:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_media:
  backend_static:
  backend_db:
  backend_models:
